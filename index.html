<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday Mayiii ❤️</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        color: white;
        overflow-x: hidden;
    }

    h1 {
        font-family: 'Great Vibes', cursive;
        font-size: 3em;
        margin-top: 20px;
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow: 0 0 10px #fff; }
        to { text-shadow: 0 0 20px #ffe6f2; }
    }

    .container {
        padding: 20px;
    }

    .message {
        font-size: 1.2em;
        max-width: 800px;
        margin: auto;
        line-height: 1.6;
    }

    .countdown {
        font-size: 1.8em;
        margin: 20px 0;
        font-weight: bold;
    }

    button {
        background: white;
        color: #ff4da6;
        border: none;
        padding: 12px 25px;
        font-size: 18px;
        border-radius: 30px;
        cursor: pointer;
        margin: 10px;
        font-weight: bold;
        transition: 0.3s;
    }

    button:hover {
        background: #ff4da6;
        color: white;
    }

    /* Gallery */
    .gallery img {
        width: 260px;
        max-width: 90%;
        margin: 10px;
        border-radius: 15px;
        border: 4px solid white;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    /* Popup */
    .popup {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.85);
        justify-content: center;
        align-items: center;
    }

    .popup-content {
        background: white;
        color: #ff4da6;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        animation: pop 0.5s ease-in-out;
    }

    @keyframes pop {
        from { transform: scale(0.5); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
    }

    .cake {
        font-size: 80px;
    }

    footer {
        margin-top: 20px;
        font-size: 1.2em;
    }

    .signature {
        font-family: 'Great Vibes', cursive;
        font-size: 1.6em;
    }

    /* Cake Cutting Animation */
    .cake-container {
        display: none;
        margin-top: 20px;
    }

    .cake-box {
        width: 200px;
        height: 120px;
        background: #ff69b4;
        margin: auto;
        border-radius: 10px;
        position: relative;
    }

    .cake-box::before {
        content: "";
        position: absolute;
        width: 200px;
        height: 40px;
        background: #fff;
        top: -20px;
        border-radius: 10px;
    }

    .candle {
        width: 10px;
        height: 30px;
        background: orange;
        position: absolute;
        top: -50px;
        left: 95px;
    }

    .flame {
        width: 10px;
        height: 15px;
        background: yellow;
        border-radius: 50%;
        position: absolute;
        top: -65px;
        left: 95px;
        animation: flicker 0.3s infinite alternate;
    }

    @keyframes flicker {
        from { opacity: 1; }
        to { opacity: 0.5; }
    }

    /* Floating Hearts */
    .heart {
        position: fixed;
        bottom: -10px;
        font-size: 20px;
        animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
        from {
            transform: translateY(0);
            opacity: 1;
        }
        to {
            transform: translateY(-100vh);
            opacity: 0;
        }
    }
</style>
